openapi: 3.0.3
info:
  title: Six Cities API
  version: 1.0.0
  description: |
    REST API for the "Six Cities" project.

    This specification describes available resources and operations for managing offers, categories, users, comments and favorites.

servers:
  - url: https://localhost:3000
    description: Local development server

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      summary: Authenticate user and return access token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/DefaultError'

  /auth/logout:
    post:
      summary: Logout current user (invalidate token/session)
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/DefaultError'

  /auth/me:
    get:
      summary: Get current authenticated user
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User is authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/DefaultError'

  /offers:
    get:
      summary: Get list of offers
      tags:
        - Offers
      parameters:
        - name: limit
          in: query
          description: Maximum number of offers to return (default 60)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 60
      responses:
        '200':
          description: List of offers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Offer'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/DefaultError'
    post:
      summary: Create a new offer
      tags:
        - Offers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOfferRequest'
      responses:
        '201':
          description: Created offer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Offer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/DefaultError'

  /offers/{offerId}:
    parameters:
      - name: offerId
        in: path
        description: Offer id
        required: true
        schema:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          maxLength: 24
    get:
      summary: Get a single offer
      tags:
        - Offers
      responses:
        '200':
          description: Offer found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Offer'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/DefaultError'
    put:
      summary: Update an offer
      tags:
        - Offers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOfferRequest'
      responses:
        '200':
          description: Updated offer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Offer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/DefaultError'
    delete:
      summary: Delete an offer
      tags:
        - Offers
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Offer deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/DefaultError'

  /offers/{offerId}/comments:
    parameters:
      - name: offerId
        in: path
        description: Offer id
        required: true
        schema:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          maxLength: 24
    get:
      summary: Get comments for an offer
      tags:
        - Comments
      parameters:
        - name: limit
          in: query
          description: Maximum number of comments to return (default 50)
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 50
      responses:
        '200':
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/DefaultError'
    post:
      summary: Create a new comment for an offer
      tags:
        - Comments
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Created comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/DefaultError'

  /offers/premium:
    get:
      summary: Get list of premium offers for a city
      tags:
        - Offers
      parameters:
        - name: city
          in: query
          description: City name for filtering premium offers
          schema:
            type: string
            enum:
              - Paris
              - Cologne
              - Brussels
              - Amsterdam
              - Hamburg
              - Dusseldorf
      responses:
        '200':
          description: List of premium offers
          content:
            application/json:
              schema:
                type: array
                maxItems: 3
                items:
                  $ref: '#/components/schemas/Offer'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/DefaultError'

  /favorites:
    get:
      summary: Get list of favorite offers for current user
      tags:
        - Favorites
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of favorite offers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Offer'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/DefaultError'

  /favorites/{offerId}:
    parameters:
      - name: offerId
        in: path
        description: Offer id
        required: true
        schema:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          maxLength: 24
    post:
      summary: Add offer to favorites
      tags:
        - Favorites
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Offer added to favorites
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/DefaultError'
    delete:
      summary: Remove offer from favorites
      tags:
        - Favorites
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Offer removed from favorites
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/DefaultError'

  /categories:
    get:
      summary: Get list of categories
      tags:
        - Categories
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                maxItems: 1000
                items:
                  $ref: '#/components/schemas/Category'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/DefaultError'
    post:
      summary: Create a new category
      tags:
        - Categories
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Created category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/BadRequest'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/DefaultError'

  /categories/{categoryId}:
    parameters:
      - name: categoryId
        in: path
        description: Category id
        required: true
        schema:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          maxLength: 24
    get:
      summary: Get a single category
      tags:
        - Categories
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Category found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/DefaultError'

  /users:
    post:
      summary: Create a new user
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        default:
          $ref: '#/components/responses/DefaultError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
          maxLength: 1000
          pattern: '^.*$'
        details:
          type: object
          additionalProperties: true
      required:
        - message

    User:
      type: object
      additionalProperties: false
      properties:
        _id:
          type: string
          description: MongoDB ObjectId
        email:
          type: string
          format: email
          maxLength: 254
          pattern: '^.*$'
        name:
          type: string
          minLength: 1
          maxLength: 15
        avatarUrl:
          type: string
          maxLength: 255
          pattern: '^.*$'
        type:
          type: string
          enum:
            - regular
            - pro
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - email
        - name
        - type

    CreateUserRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          pattern: '^.*$'
        password:
          type: string
          format: password
          minLength: 6
          maxLength: 12
          pattern: '^.*$'
        name:
          type: string
          minLength: 1
          maxLength: 15
        avatarUrl:
          type: string
          maxLength: 255
          pattern: '^.*$'
        type:
          type: string
          enum:
            - regular
            - pro
      required:
        - email
        - password
        - name
        - type

    Category:
      type: object
      additionalProperties: false
      properties:
        _id:
          type: string
          description: MongoDB ObjectId
        name:
          type: string
          maxLength: 100
          pattern: '^.*$'
        image:
          type: string
          maxLength: 200
          pattern: '^.*$'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - name
        - image

    CreateCategoryRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          maxLength: 100
          pattern: '^.*$'
        image:
          type: string
          maxLength: 200
          pattern: '^.*$'
      required:
        - name
        - image

    AuthRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          pattern: '^.*$'
        password:
          type: string
          format: password
          minLength: 6
          maxLength: 12
          pattern: '^.*$'
      required:
        - email
        - password

    AuthResponse:
      type: object
      additionalProperties: false
      properties:
        token:
          type: string

    Location:
      type: object
      additionalProperties: false
      properties:
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180
      required:
        - latitude
        - longitude

    Offer:
      type: object
      additionalProperties: false
      properties:
        _id:
          type: string
          description: MongoDB ObjectId
        title:
          type: string
          minLength: 10
          maxLength: 100
        description:
          type: string
          minLength: 20
          maxLength: 1024
        postDate:
          type: string
          format: date-time
        city:
          type: string
          enum:
            - Paris
            - Cologne
            - Brussels
            - Amsterdam
            - Hamburg
            - Dusseldorf
        previewImage:
          type: string
          format: uri
        images:
          type: array
          minItems: 6
          maxItems: 6
          items:
            type: string
            format: uri
        isPremium:
          type: boolean
        isFavorite:
          type: boolean
        rating:
          type: number
          minimum: 1
          maximum: 5
        type:
          type: string
          enum:
            - apartment
            - house
            - room
            - hotel
        rooms:
          type: integer
          minimum: 1
          maximum: 8
        guests:
          type: integer
          minimum: 1
          maximum: 10
        price:
          type: number
          minimum: 100
          maximum: 100000
        goods:
          type: array
          items:
            type: string
            enum:
              - Breakfast
              - Air conditioning
              - Laptop friendly workspace
              - Baby seat
              - Washer
              - Towels
              - Fridge
        authorId:
          type: string
          description: User id
          pattern: '^[a-fA-F0-9]{24}$'
          maxLength: 24
        commentCount:
          type: integer
          minimum: 0
          default: 0
        location:
          $ref: '#/components/schemas/Location'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - title
        - description
        - postDate
        - city
        - previewImage
        - images
        - isPremium
        - isFavorite
        - rating
        - type
        - rooms
        - guests
        - price
        - goods
        - authorId

    CreateOfferRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          minLength: 10
          maxLength: 100
        description:
          type: string
          minLength: 20
          maxLength: 1024
        postDate:
          type: string
          format: date-time
        city:
          type: string
          enum:
            - Paris
            - Cologne
            - Brussels
            - Amsterdam
            - Hamburg
            - Dusseldorf
        previewImage:
          type: string
          format: uri
        images:
          type: array
          minItems: 6
          maxItems: 6
          items:
            type: string
            format: uri
        isPremium:
          type: boolean
        isFavorite:
          type: boolean
        rating:
          type: number
          minimum: 1
          maximum: 5
        type:
          type: string
          enum:
            - apartment
            - house
            - room
            - hotel
        rooms:
          type: integer
          minimum: 1
          maximum: 8
        guests:
          type: integer
          minimum: 1
          maximum: 10
        price:
          type: number
          minimum: 100
          maximum: 100000
        goods:
          type: array
          items:
            type: string
            enum:
              - Breakfast
              - Air conditioning
              - Laptop friendly workspace
              - Baby seat
              - Washer
              - Towels
              - Fridge
        authorId:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          maxLength: 24
      required:
        - title
        - description
        - postDate
        - city
        - previewImage
        - images
        - isPremium
        - isFavorite
        - rating
        - type
        - rooms
        - guests
        - price
        - goods
        - authorId

    UpdateOfferRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          minLength: 10
          maxLength: 100
        description:
          type: string
          minLength: 20
          maxLength: 1024
        postDate:
          type: string
          format: date-time
        city:
          type: string
          enum:
            - Paris
            - Cologne
            - Brussels
            - Amsterdam
            - Hamburg
            - Dusseldorf
        previewImage:
          type: string
          format: uri
        images:
          type: array
          minItems: 6
          maxItems: 6
          items:
            type: string
            format: uri
        isPremium:
          type: boolean
        isFavorite:
          type: boolean
        rating:
          type: number
          minimum: 1
          maximum: 5
        type:
          type: string
          enum:
            - apartment
            - house
            - room
            - hotel
        rooms:
          type: integer
          minimum: 1
          maximum: 8
        guests:
          type: integer
          minimum: 1
          maximum: 10
        price:
          type: number
          minimum: 100
          maximum: 100000
        goods:
          type: array
          items:
            type: string
            enum:
              - Breakfast
              - Air conditioning
              - Laptop friendly workspace
              - Baby seat
              - Washer
              - Towels
              - Fridge
        authorId:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          maxLength: 24
      description: Fields to update (all optional)

    Comment:
      type: object
      additionalProperties: false
      properties:
        _id:
          type: string
          description: MongoDB ObjectId
        text:
          type: string
          minLength: 5
          maxLength: 1024
        postDate:
          type: string
          format: date-time
        rating:
          type: integer
          minimum: 1
          maximum: 5
        userId:
          type: string
          description: User id
          pattern: '^[a-fA-F0-9]{24}$'
          maxLength: 24
        offerId:
          type: string
          description: Offer id
          pattern: '^[a-fA-F0-9]{24}$'
          maxLength: 24
      required:
        - text
        - rating
        - userId
        - offerId

    CreateCommentRequest:
      type: object
      additionalProperties: false
      properties:
        text:
          type: string
          minLength: 5
          maxLength: 1024
        rating:
          type: integer
          minimum: 1
          maximum: 5
        userId:
          type: string
          description: User id
          pattern: '^[a-fA-F0-9]{24}$'
          maxLength: 24
      required:
        - text
        - rating
        - userId

  responses:
    NotFound:
      description: Entity not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotAcceptable:
      description: Not acceptable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnsupportedMediaType:
      description: Unsupported media type
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    DefaultError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

tags:
  - name: Auth
    description: Аутентификация и проверка состояния пользователя
  - name: Offers
    description: Работа с объявлениями
  - name: Comments
    description: Работа с комментариями
  - name: Favorites
    description: Работа с избранным
  - name: Categories
    description: Работа с категориями
  - name: Users
    description: Работа с пользователями
